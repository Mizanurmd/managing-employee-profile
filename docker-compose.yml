services:

  postgres:
    image: postgres:17
    container_name: postgres_db
    environment:
      POSTGRES_DB: employee_profile_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"

  springboot-app:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: employee_app
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/employee_profile_DB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root